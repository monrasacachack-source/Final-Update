<!DOCTYPE html>
<html>
<head>
    <title>AI Space Survival - Pixel Ultimate</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Courier New', Courier, monospace; }
        
        #gameWrapper { 
            position: relative; 
            width: 500px; 
            height: 700px; 
            margin: 10px auto; 
            border: 4px solid #333; 
            box-shadow: 0 0 25px rgba(0,255,0,0.3); 
        }
        canvas { display: block; background: #0b0b1e; }
        
        /* Retro Pixel UI Overlay */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 25, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            padding: 30px;
        }
        
        h1 { font-size: 38px; margin-bottom: 10px; color: #00ff00; text-shadow: 4px 4px #005500; }
        h2 { font-size: 42px; margin-bottom: 15px; color: #ff3333; text-shadow: 4px 4px #550000; }
        p { font-size: 16px; line-height: 1.5; margin-bottom: 20px; color: #aaa; }
        
        .section-title { color: #ffff00; font-weight: bold; margin-top: 10px; font-size: 18px; }
        
        /* Difficulty Select Grid */
        .diff-container { display: flex; gap: 15px; margin-bottom: 25px; }
        
        /* Retro Arcade Buttons */
        .btn {
            background: #222;
            color: #00ff00;
            border: 3px solid #00ff00;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 4px 4px #005500;
            transition: all 0.1s ease;
        }
        .btn:hover { background: #00ff00; color: #000; box-shadow: 2px 2px #005500; transform: translate(2px, 2px); }
        .btn:active { box-shadow: 0px 0px #005500; transform: translate(4px, 4px); }
        
        .btn-easy { color: #00ff00; border-color: #00ff00; box-shadow: 4px 4px #005500; }
        .btn-medium { color: #ffff00; border-color: #ffff00; box-shadow: 4px 4px #555500; }
        .btn-hard { color: #ff3333; border-color: #ff3333; box-shadow: 4px 4px #550000; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <div id="startScreen" class="ui-screen">
            <h1>SPACE SURVIVAL</h1>
            <p style="color: #00ffff; font-size: 18px;">[ PIXEL ARCADE EDITION ]</p>
            
            <p class="section-title">--- TUTORIAL ---</p>
            <p>Use <b>ARROW KEYS</b> or <b>W, A, S, D</b> to fly your Starship.<br>
            Avoid <b>METEORS (Red)</b>. Max 3 Lives (❤).<br>
            Collect rare falling <b>HEARTS</b> to restore HP!</p>
            
            <p class="section-title">--- SELECT DIFFICULTY ---</p>
            <div class="diff-container">
                <button class="btn btn-easy" onclick="startGame('EASY')">EASY</button>
                <button class="btn btn-medium" onclick="startGame('MEDIUM')">MEDIUM</button>
                <button class="btn btn-hard" onclick="startGame('HARD')">HARD</button>
            </div>
        </div>

        <div id="pauseScreen" class="ui-screen hidden">
            <h1 style="color: #ffff00; text-shadow: 4px 4px #555500; font-size: 40px;">GAME PAUSED</h1>
            <p>Click below to control your session</p>
            <button class="btn" onclick="togglePause()" style="margin-bottom: 12px; width: 220px;">RESUME</button>
            <button class="btn" onclick="triggerRestart()" style="margin-bottom: 12px; border-color: #ffaa00; color: #ffaa00; box-shadow: 4px 4px #553300; width: 220px;">RESTART</button>
            <button class="btn" onclick="backToMenuFromPause()" style="border-color: #ffffff; color: #ffffff; box-shadow: 4px 4px #555555; width: 220px;">MAIN MENU</button>
        </div>

        <div id="gameOverScreen" class="ui-screen hidden">
            <h2>GAME OVER</h2>
            <p id="finalScoreDisplay" style="font-size: 24px; color: #ffff00; font-weight: bold;"></p>
            <p id="difficultyDisplay" style="font-size: 18px; margin-bottom: 25px;"></p>
            <div style="display: flex; gap: 15px;">
                <button class="btn" onclick="triggerRestart()" style="border-color: #00ffcc; color: #00ffcc; box-shadow: 4px 4px #005544;">RESTART</button>
                <button class="btn" onclick="backToMenu()" style="border-color: #ffffff; color: #ffffff; box-shadow: 4px 4px #555555;">MAIN MENU</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // UI Screens
        const startScreen = document.getElementById("startScreen");
        const pauseScreen = document.getElementById("pauseScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalScoreDisplay = document.getElementById("finalScoreDisplay");
        const difficultyDisplay = document.getElementById("difficultyDisplay");

        canvas.width = 500;
        canvas.height = 700;

        let gameState = "START"; 
        let isPaused = false;
        let score = 0;
        let currentDifficulty = "EASY";

        // คอนฟิกเริ่มต้น
        let config = { spawnRate: 0.04, minSpeed: 1.2, maxSpeed: 2.5, heartSpawnRate: 0.0015 };

        // Game Entities
        let player = { x: 230, y: 580, w: 36, h: 36, speed: 6, hp: 3 };
        let enemies = [];
        let hearts = [];
        let stars = []; 

        const pauseBtnUI = { x: 15, y: 55, w: 90, h: 30 };

        // Keyboard Controls State
        let keys = { 
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false, W: false, A: false, S: false, D: false
        };

        // Initialize Starfield
        for (let i = 0; i < 50; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 1, speed: Math.random() * 1.5 + 0.5 });
        }

        // Keyboard Listeners
        window.addEventListener("keydown", (e) => {
            if (e.key in keys) keys[e.key] = true;
            if ((e.key === "p" || e.key === "P" || e.key === "Escape") && (gameState === "PLAYING" || gameState === "PAUSED")) {
                togglePause();
            }
        });
        window.addEventListener("keyup", (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        // Mouse Click Listener
        canvas.addEventListener("click", (e) => {
            if (gameState !== "PLAYING") return;
            
            let rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;

            if (mouseX >= pauseBtnUI.x && mouseX <= pauseBtnUI.x + pauseBtnUI.w &&
                mouseY >= pauseBtnUI.y && mouseY <= pauseBtnUI.y + pauseBtnUI.h) {
                togglePause();
            }
        });

        // ปรับสมดุลใหม่: ลดอัตราการเกิด (spawnRate) ของโหมดปกติและโหมดยากลง แต่คงความเร็วเดิมไว้
        function setDifficulty(diff) {
            currentDifficulty = diff;
            if (diff === "EASY") {
                config.spawnRate = 0.04; config.minSpeed = 1.2; config.maxSpeed = 2.5; config.heartSpawnRate = 0.0015;
            } else if (diff === "MEDIUM") {
                config.spawnRate = 0.045; // ลดลงจากเดิม 0.06 (จำนวนอุกกาบาตลดลงอย่างชัดเจน)
                config.minSpeed = 3.0; 
                config.maxSpeed = 5.5; 
                config.heartSpawnRate = 0.0010;
            } else if (diff === "HARD") {
                config.spawnRate = 0.06; // ลดลงจากเดิม 0.09 (จำนวนอุกกาบาตลดลง แต่ความเร็วเท่าเดิม)
                config.minSpeed = 4.5; 
                config.maxSpeed = 8.5; 
                config.heartSpawnRate = 0.0005;
            }
        }

        function startGame(difficulty) {
            setDifficulty(difficulty);
            startScreen.classList.add("hidden");
            resetGameSession();
            gameState = "PLAYING";
        }

        function togglePause() {
            if (gameState !== "PLAYING" && gameState !== "PAUSED") return;
            isPaused = !isPaused;
            if (isPaused) {
                gameState = "PAUSED";
                pauseScreen.classList.remove("hidden");
            } else {
                gameState = "PLAYING";
                pauseScreen.classList.add("hidden");
            }
        }

        function triggerRestart() {
            pauseScreen.classList.add("hidden");
            gameOverScreen.classList.add("hidden");
            isPaused = false;
            resetGameSession();
            gameState = "PLAYING";
        }

        function backToMenu() {
            gameOverScreen.classList.add("hidden");
            startScreen.classList.remove("hidden");
            gameState = "START";
        }

        // ฟังก์ชันกลับหน้าหลักจากหน้าต่าง Pause
        function backToMenuFromPause() {
            pauseScreen.classList.add("hidden");
            isPaused = false;
            startScreen.classList.remove("hidden");
            gameState = "START";
        }

        function resetGameSession() {
            player.x = canvas.width / 2 - (player.w / 2);
            player.y = canvas.height - 100;
            player.hp = 3;
            enemies = [];
            hearts = [];
            score = 0;
        }

        // พิกเซลอาร์ต: ยานอวกาศ
        function drawPixelShip(x, y) {
            ctx.fillStyle = "#00ffcc"; 
            ctx.fillRect(x + 14, y, 8, 8);
            ctx.fillRect(x + 10, y + 8, 16, 8);
            ctx.fillRect(x + 6, y + 16, 24, 8);
            ctx.fillRect(x, y + 24, 36, 12);
            ctx.fillStyle = Math.random() > 0.5 ? "#ff5500" : "#ffaa00";
            ctx.fillRect(x + 8, y + 36, 4, 4);
            ctx.fillRect(x + 24, y + 36, 4, 4);
        }

        // พิกเซลอาร์ต: อุกกาบาต
        function drawPixelMeteor(x, y, size) {
            ctx.fillStyle = "#a349a4"; 
            ctx.fillRect(x, y, size, size);
            ctx.fillStyle = "#7f267f"; 
            ctx.fillRect(x + 4, y + 4, size - 8, size - 8);
            ctx.fillStyle = "#220022";
            ctx.fillRect(x + 8, y + 6, 6, 4);
            ctx.fillRect(x + 14, y + 18, 8, 4);
        }

        // พิกเซลอาร์ต: ไอเทมหัวใจ
        function drawPixelHeart(x, y, size) {
            ctx.fillStyle = "#ff2266"; 
            ctx.fillRect(x + 4, y, 8, 4); ctx.fillRect(x + 16, y, 8, 4);
            ctx.fillRect(x, y + 4, 28, 8);
            ctx.fillRect(x + 4, y + 12, 20, 4);
            ctx.fillRect(x + 8, y + 16, 12, 4);
            ctx.fillRect(x + 12, y + 20, 4, 4);
        }

        function handleEntitySpawning() {
            if (Math.random() < config.spawnRate) {
                enemies.push({ x: Math.random() * (canvas.width - 32), y: -32, size: 32, speed: config.minSpeed + Math.random() * (config.maxSpeed - config.minSpeed) });
            }
            if (Math.random() < config.heartSpawnRate) {
                hearts.push({ x: Math.random() * (canvas.width - 28), y: -28, size: 28, speed: 2.0 });
            }
        }

        function update() {
            if (gameState !== "PLAYING") return;

            if ((keys.ArrowUp || keys.w || keys.W) && player.y > 0) player.y -= player.speed;
            if ((keys.ArrowDown || keys.s || keys.S) && player.y < canvas.height - player.h) player.y += player.speed;
            if ((keys.ArrowLeft || keys.a || keys.A) && player.x > 0) player.x -= player.speed;
            if ((keys.ArrowRight || keys.d || keys.D) && player.x < canvas.width - player.w) player.x += player.speed;

            handleEntitySpawning();

            // ตรวจสอบอุกกาบาต
            enemies.forEach((enemy, index) => {
                enemy.y += enemy.speed;
                if (player.x < enemy.x + enemy.size && player.x + player.w > enemy.x &&
                    player.y < enemy.y + enemy.size && player.y + player.h > enemy.y) {
                    enemies.splice(index, 1);
                    player.hp--;
                    if (player.hp <= 0) {
                        gameState = "GAMEOVER";
                        finalScoreDisplay.innerText = "Final Score: " + score;
                        difficultyDisplay.innerText = "Difficulty: " + currentDifficulty;
                        gameOverScreen.classList.remove("hidden");
                    }
                }
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                }
            });

            // ตรวจสอบการเก็บหัวใจ
            hearts.forEach((heart, index) => {
                heart.y += heart.speed;
                if (player.x < heart.x + heart.size && player.x + player.w > heart.x &&
                    player.y < heart.y + heart.size && player.y + player.h > heart.y) {
                    hearts.splice(index, 1);
                    if (player.hp < 3) player.hp++; 
                }
                if (heart.y > canvas.height) {
                    hearts.splice(index, 1);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // วาดพื้นหลังดวงดาว
            ctx.fillStyle = "#ffffff";
            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, star.size, star.size);
                if (gameState === "PLAYING") {
                    star.y += star.speed;
                    if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
                }
            });

            drawPixelShip(player.x, player.y);
            enemies.forEach(enemy => drawPixelMeteor(enemy.x, enemy.y, enemy.size));
            hearts.forEach(heart => drawPixelHeart(heart.x, heart.y, heart.size));
            
            // แสดง Score
            ctx.fillStyle = "#ffff00";
            ctx.font = "bold 20px 'Courier New'";
            ctx.fillText("SCORE: " + score, 15, 35);

            // ปุ่ม PAUSE
            ctx.fillStyle = "#555555";
            ctx.fillRect(pauseBtnUI.x, pauseBtnUI.y, pauseBtnUI.w, pauseBtnUI.h);
            ctx.strokeStyle = "#ffff00";
            ctx.lineWidth = 2;
            ctx.strokeRect(pauseBtnUI.x, pauseBtnUI.y, pauseBtnUI.w, pauseBtnUI.h);
            
            ctx.fillStyle = "#ffff00";
            ctx.font = "bold 14px 'Courier New'";
            ctx.fillText("[II] PAUSE", pauseBtnUI.x + 8, pauseBtnUI.y + 20);

            // แสดงหัวใจดวงโต
            ctx.fillStyle = "#ff2266";
            let heartString = "";
            for(let i=0; i<player.hp; i++) { heartString += "❤ "; }
            ctx.font = "24px Arial";
            ctx.fillText(heartString, canvas.width - 110, 35);

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
